name: Weekly Lint and Format Fix

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:
  push: # temp for development

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-format-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install autopep8 pylint

      - name: Run autopep8 auto-fix
        run: |
          # fix PEP 8 style issues in-place
          # use --max-line-length 120 consistent with pylint config
          autopep8 --in-place --recursive \
            --max-line-length 120 \
            --exclude "fre/mkmf,fre/gfdl_msd_schemas,build,fre_cli.egg-info" \
            fre/

      - name: Report pylint score
        run: |
          # install minimal deps so pylint can parse imports
          pip install click pyyaml jsonschema || true

          echo "Current pylint score (for reference):"
          pylint --rcfile pylintrc \
            --exit-zero \
            --score=yes \
            fre/ 2>&1 | tail -5 || true

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7.0.6
        with:
          base: main
          branch: automated/weekly-lint-format-fix
          branch-suffix: timestamp
          delete-branch: true
          title: "style: weekly automated lint and format fixes"
          body: |
            Automated weekly code style fixes generated by `autopep8`.

            Changes apply PEP 8 formatting corrections with `--max-line-length 120`
            consistent with the project's pylint configuration.

            Please review the changes carefully before merging.
            This PR will need to be closed and reopened to run CI testing.
          commit-message: "style: automated lint and format fixes via autopep8"
