name: Weekly Spell Check Fix

on:
  push: # temp / confirm functioning

#  schedule:
#    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
#  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  spellcheck-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install codespell
        run: pip install codespell

      - name: Run codespell auto-fix
        run: |
          codespell -c --write-changes \
            --skip="*.cdl,./build,./fre_cli.egg-info,./fre/mkmf,./fre/gfdl_msd_schemas,./fre/tests/test_files/cmip6-cmor-tables,.git" \
            --ignore-words=".cspell/ok-unknown-words.txt" \
            fre/ docs/ *.md *.rst 2>&1 || true

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7.0.6
        if: false
        with:
          base: main
          branch: automated/weekly-spellcheck-fix
          branch-suffix: timestamp
          delete-branch: true
          title: "fix: weekly automated spell check corrections"
          body: |
            Automated weekly spell check fixes generated by `codespell`.

            Please review the changes carefully before merging.
            This PR will need to be closed and reopened to run CI testing.
          commit-message: "fix: automated spell check corrections via codespell"
