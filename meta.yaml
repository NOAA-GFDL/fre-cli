package:
  name: fre-cli
  version: '{{ environ.get("GIT_DESCRIBE_TAG", "develop") }}'

source:
  path: .

build:
  script:
    - {{ PYTHON }} -m pip install . -vv
    - |
      # Backwards-compatible copy of mkmf executables:
      # mkmf PR 75 moved bin/ to mkmf/bin/ within the mkmf repository,
      # so the submodule path changed from fre/mkmf/bin/ to fre/mkmf/mkmf/bin/.
      # Try the new path first, fall back to the old path.
      # If neither exists, warn but continue (mkmf may be a separate conda dependency).
      for exe in mkmf list_paths git-version-string; do
        if [ -f "fre/mkmf/mkmf/bin/$exe" ]; then
          cp "fre/mkmf/mkmf/bin/$exe" "$PREFIX/bin/$exe"
        elif [ -f "fre/mkmf/bin/$exe" ]; then
          cp "fre/mkmf/bin/$exe" "$PREFIX/bin/$exe"
        else
          echo "Warning: $exe not found in mkmf submodule (checked fre/mkmf/mkmf/bin/ and fre/mkmf/bin/). Expected to be provided by a separate noaa-gfdl::mkmf conda dependency."
        fi
      done
  noarch: python

channels:
    - conda-forge
    - noaa-gfdl

requirements:
  build:
    - python>=3.11
    - pip
    - setuptools
    - wheel
  host:
    - python>=3.11
    - setuptools
  run:
    - python>=3.11
    - noaa-gfdl::analysis_scripts==0.0.1
    - noaa-gfdl::catalogbuilder==2025.01.01
#    - noaa-gfdl::fre-nctools==2022.02.01
    - conda-forge::cdo>=2
    - conda-forge::cftime
    - conda-forge::click>=8.2
    - conda-forge::cmor>=3.14
    - conda-forge::cylc-flow>=8.2
    - conda-forge::cylc-rose
    - conda-forge::jinja2>=3
    - conda-forge::jsonschema
    - conda-forge::metomi-rose
    - conda-forge::nccmp
#    - conda-forge::numpy==1.26.4
    - conda-forge::numpy>=2
    - conda-forge::python-cdo
    - conda-forge::pyyaml
    - conda-forge::xarray>=2024.*
    - conda-forge::netcdf4>=1.7.*

test:
  requires:
    - conda-forge::pylint
    - conda-forge::pytest
    - conda-forge::pytest-cov
  source_files:
    - fre/
  files:
    - pylintrc
    - fre/mkmf/templates/*
  imports:
    - fre
    - fre.app
    - fre.catalog
    - fre.check
    - fre.cmor
    - fre.list_
    - fre.make
    - fre.pp
    - fre.run
    - fre.yamltools
  commands:
    - fre --help
    - fre app --help
    - fre catalog --help
    - fre check --help
    - fre cmor --help
    - fre list --help
    - fre make --help
    - fre pp --help
    - fre run --help
    - fre yamltools --help
    - pylint --rcfile pylintrc fre/
    - pytest --durations=20 --log-level INFO --ignore=fre/make/tests/compilation fre/


about:
  home: https://github.com/NOAA-GFDL/fre-cli
  license: Apache2.0
  license_file: LICENSE.md
  summary: Command line interface for FMS Runtime Environment (FRE) workflow commands
  author: Bennett Chang, Dana Singh, Chris Blanton
